backup:
  exclude_patterns:
  - ~$*
  - '*.tmp'
  - Thumbs.db
  - .DS_Store
  - desktop.ini
  - '*.lnk'
  - pagefile.sys
  - hiberfil.sys
  - node_modules
  - .pyc
  - __pycache__
  verify_checksums: true
  version_count: 5
logging:
  level: INFO
  log_dir: logs
  retention_days: 365
performance:
  chunk_size_mb: 4
  concurrency: 4
  max_file_size_gb: 5
retention:
  daily_days: 90
  guard_days: 7
  weekly_days: 365
schedule:
  max_job_minutes: 240
  retry_count: 3
  retry_delay_minutes: 30
  time: 08:00
  timezone: Asia/Kathmandu
smtp:
  host: smtp.office365.com
  port: 587
  recipients: []
  use_tls: true
sources:
- enabled: true
  label: AI-Powered Document Classifier
  path: C:\My Projects\Projects\AI-Powered Document Classifier
ssd_path: D:\
