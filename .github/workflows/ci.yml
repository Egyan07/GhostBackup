name: GhostBackup CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:

  # ── Python backend ──────────────────────────────────────────────────────────
  backend:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Syntax check (all backend modules)
        run: |
          python -m py_compile backend/api.py
          python -m py_compile backend/config.py
          python -m py_compile backend/manifest.py
          python -m py_compile backend/reporter.py
          python -m py_compile backend/scheduler.py
          python -m py_compile backend/setup_helper.py
          python -m py_compile backend/syncer.py
          python -m py_compile backend/utils.py
          python -m py_compile backend/watcher.py
          echo "All syntax checks passed"

      - name: Run backend tests with coverage
        run: |
          pip install pytest-cov
          pytest backend/tests/ -v \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=60
        env:
          GHOSTBACKUP_CONFIG: backend/config/config.yaml.example
          GHOSTBACKUP_API_PORT: "8765"

  # ── JavaScript frontend ─────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install flake8
        run: pip install flake8

      - name: Python lint (errors only)
        run: |
          flake8 backend/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=backend/.venv,backend/__pycache__,backend/tests/__pycache__

      - name: Install Node dependencies
        run: npm ci

      - name: JavaScript lint
        run: npx eslint src/
