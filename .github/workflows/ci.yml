name: GhostBackup CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:

  # ── Python backend ──────────────────────────────────────────────────────────
  backend:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Syntax check (all backend modules)
        run: python -m compileall backend/ -q

      - name: Run backend tests with coverage
        run: |
          pip install pytest-cov
          pytest backend/tests/ -v \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=90
        env:
          GHOSTBACKUP_CONFIG: backend/config/config.yaml.example
          GHOSTBACKUP_API_PORT: "8765"

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-py${{ matrix.python-version }}
          path: .coverage
          retention-days: 7

  # ── JavaScript frontend ─────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Run frontend coverage
        if: matrix.node-version == '22'
        run: npm run test:coverage -- --coverage.thresholds.statements=60

      - name: Upload frontend coverage
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: src/coverage/
          retention-days: 7

  # ── E2E Integration ──────────────────────────────────────────────────────
  e2e:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run E2E pipeline tests
        run: |
          pytest backend/tests/test_e2e_pipeline.py backend/tests/test_e2e_ci.py -v --tb=short
        env:
          GHOSTBACKUP_CONFIG: backend/config/config.yaml.example

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install flake8
        run: pip install flake8

      - name: Python lint (errors only)
        run: |
          flake8 backend/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=backend/.venv,backend/__pycache__,backend/tests/__pycache__

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Type check (mypy)
        run: |
          cd backend
          mypy api.py syncer.py config.py manifest.py errors.py \
            --config-file mypy.ini

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: Check formatting
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}" "electron/**/*.{js,mjs}"

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: JavaScript lint
        run: npm run lint

  # ── OpenAPI Schema Validation ─────────────────────────────────────────────
  openapi:
    name: OpenAPI Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Start backend and export OpenAPI schema
        run: |
          cd backend
          python -c "
          from api import app
          import json
          schema = app.openapi()
          # Validate basic structure
          assert schema.get('openapi', '').startswith('3.'), 'Not a valid OpenAPI 3.x schema'
          assert 'paths' in schema, 'Schema has no paths'
          assert len(schema['paths']) > 0, 'Schema has no endpoints'
          assert 'info' in schema, 'Schema has no info block'
          assert schema['info']['title'] == 'GhostBackup API', f'Unexpected title: {schema[\"info\"][\"title\"]}'
          # Write schema to file for artifact
          with open('../openapi.json', 'w') as f:
              json.dump(schema, f, indent=2)
          print(f'OpenAPI schema valid: {len(schema[\"paths\"])} endpoints')
          "
        env:
          GHOSTBACKUP_CONFIG: backend/config/config.yaml.example
          GHOSTBACKUP_API_PORT: "8765"

      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: openapi.json
          retention-days: 30

  # ── Security ─────────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt \
            --ignore-vuln CVE-2026-26007 \
            --ignore-vuln CVE-2026-34073
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Node dependency audit
        run: |
          npm install --legacy-peer-deps
          npm audit --audit-level=high
